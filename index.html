<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Posti Route Timer</title>

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
font-size:20px;
padding:12px 25px;
margin-top:10px;
}

#timer{
font-size:50px;
margin:20px;
font-weight:bold;
}

.route{
padding:10px;
margin:5px;
border-radius:6px;
}

.finished{background:#a7e6a7;}
.current{background:#ffe066;}
.pending{background:#dddddd;}

#stopAlarmBtn{
background:red;
color:white;
display:none;
}

#nextRoute{
font-size:20px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<h2>Posti Route Timer</h2>

<select id="area">
<option>Pyynikinrinne</option>
<option>Amuri</option>
<option>Armonkallio</option>
</select>

<br>

<button id="startBtn" onclick="start()">START</button>
<button id="resetBtn" onclick="reset()" style="display:none;">RESET</button>

<div id="timer">00:00</div>

<div id="nextRoute"></div>

<button id="stopAlarmBtn" onclick="stopAlarm()">
STOP ALARM
<br>
<span id="alarmInfo"></span>
</button>

<h3>Routes</h3>
<div id="routes"></div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

if(!localStorage.getItem("workerPhone")){
window.location="login.html"
}

let routes
let routeList
let schedule=[]
let currentRoute=0
let timer

let alarmInterval
let vibrationInterval

fetch('routes.json')
.then(r=>r.json())
.then(data=>{
routes=data
restoreSession()
})

function start(){

let area=document.getElementById("area").value
routeList=routes[area]

if(!routeList){
alert("Routes not loaded")
return
}

let startTime=Date.now()
let total=0

schedule=[]

routeList.forEach(r=>{
total+=r.time
schedule.push(startTime+total*60000)
})

localStorage.setItem("routeSchedule",JSON.stringify(schedule))
localStorage.setItem("routeArea",area)

currentRoute=0

initUI()
updateTimer()

}

function restoreSession(){

let savedSchedule=localStorage.getItem("routeSchedule")
let savedArea=localStorage.getItem("routeArea")

if(!savedSchedule || !savedArea) return

routeList=routes[savedArea]
schedule=JSON.parse(savedSchedule)

let now=Date.now()

currentRoute=schedule.findIndex(t=>now<t)

if(currentRoute===-1){
reset()
return
}

initUI()
updateTimer()

}

function initUI(){

document.getElementById("area").style.display="none"
document.getElementById("startBtn").style.display="none"
document.getElementById("resetBtn").style.display="inline"

drawRoutes()

}

function drawRoutes(){

let html=""

routeList.forEach((r,i)=>{

let cls="pending"

if(i<currentRoute) cls="finished"
if(i===currentRoute) cls="current"

html+=`<div class="route ${cls}">
Route ${r.route} (${r.time} min)
</div>`

})

document.getElementById("routes").innerHTML=html

}

function updateTimer(){

clearInterval(timer)

timer=setInterval(()=>{

let finish=schedule[currentRoute]
let remaining=Math.floor((finish-Date.now())/1000)

if(remaining<=0){

triggerAlarm()

currentRoute++

drawRoutes()

if(currentRoute>=schedule.length){
alert("All routes finished")
reset()
return
}

}

let m=Math.floor(remaining/60)
let s=remaining%60

document.getElementById("timer").innerText=
m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")

showNextRoute()

},1000)

}

function showNextRoute(){

if(currentRoute < routeList.length){

let next=routeList[currentRoute].route

document.getElementById("nextRoute").innerText=
"Current Route: "+next

}

}

function triggerAlarm(){

let route=routeList[currentRoute].route

let finishTime=new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

let nextRouteText=""

if(currentRoute+1 < routeList.length){
nextRouteText=" | Next: "+routeList[currentRoute+1].route
}

document.getElementById("alarmInfo").innerText=
"Route "+route+" finished at "+finishTime+nextRouteText

document.getElementById("stopAlarmBtn").style.display="inline"

alarmInterval=setInterval(()=>{
document.getElementById("alarm").play()
},2000)

vibrationInterval=setInterval(()=>{
if(navigator.vibrate){
navigator.vibrate([500,500])
}
},1000)

}

function stopAlarm(){

clearInterval(alarmInterval)
clearInterval(vibrationInterval)

document.getElementById("stopAlarmBtn").style.display="none"

}

function reset(){

localStorage.removeItem("routeSchedule")
localStorage.removeItem("routeArea")

location.reload()

}

</script>

</body>
</html>
