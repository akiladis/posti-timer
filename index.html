<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Posti Route Timer</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

button{
font-size:20px;
padding:12px 25px;
margin-top:10px;
}

#timer{
font-size:45px;
margin:20px;
}

.route{
padding:10px;
margin:5px;
border-radius:6px;
}

.finished{
background:#a7e6a7;
}

.current{
background:#ffe066;
}

.pending{
background:#dddddd;
}

#progress{
width:80%;
height:20px;
background:#ccc;
margin:auto;
margin-top:20px;
}

#bar{
height:20px;
width:0%;
background:green;
}

</style>

</head>

<body>

<h2>Posti Route Timer</h2>

<select id="area">
<option>Pyynikinrinne</option>
<option>Amuri</option>
<option>Armonkallio</option>
</select>

<br>

<button id="startBtn" onclick="start()">START</button>

<button id="resetBtn" onclick="reset()" style="display:none;">RESET</button>

<div id="timer">00:00</div>

<div id="progress">
<div id="bar"></div>
</div>

<h3>Routes</h3>

<div id="routes"></div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

let routes
let routeList
let currentRoute=0
let timeLeft
let timer

fetch('routes.json')
.then(r=>r.json())
.then(data=>routes=data)

function start(){

let area=document.getElementById("area").value

routeList=routes[area]

currentRoute=0

document.getElementById("area").style.display="none"
document.getElementById("startBtn").style.display="none"
document.getElementById("resetBtn").style.display="inline"

drawRoutes()

nextRoute()

}

function reset(){

location.reload()

}

function drawRoutes(){

let html=""

routeList.forEach((r,i)=>{

let cls="pending"

if(i<currentRoute) cls="finished"
if(i==currentRoute) cls="current"

html+=`<div class="route ${cls}">
Route ${r.route} (${r.time} min)
</div>`

})

document.getElementById("routes").innerHTML=html

}

function nextRoute(){

if(currentRoute>=routeList.length){

alert("All routes finished")

return

}

let r=routeList[currentRoute]

timeLeft=r.time*60

drawRoutes()

updateTimer()

timer=setInterval(()=>{

timeLeft--

updateTimer()

if(timeLeft<=0){

clearInterval(timer)

alarm()

currentRoute++

drawRoutes()

nextRoute()

}

},1000)

}

function updateTimer(){

let m=Math.floor(timeLeft/60)
let s=timeLeft%60

document.getElementById("timer").innerText=
m.toString().padStart(2,"0")+":"+s.toString().padStart(2,"0")

let percent=((routeList[currentRoute].time*60-timeLeft)/(routeList[currentRoute].time*60))*100

document.getElementById("bar").style.width=percent+"%"

}

function alarm(){

document.getElementById("alarm").play()

if(navigator.vibrate){

navigator.vibrate([500,200,500])

}

alert("Route finished")

}

</script>

</body>
</html>
